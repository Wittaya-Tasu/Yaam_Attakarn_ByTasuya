<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="ยามอัฐกาล" />
  <title>.ยามอัฐกาล</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="splash" class="splash" aria-hidden="true">
    <div class="splash-mark">๘</div>
    <div class="splash-title">ยามอัฐกาล</div>
    <div class="spinner"></div>
  </div>

  <main id="app" class="app is-loading">
    <header class="topbar">
      <div>
        <h1>ยามอัฐกาล</h1>
      </div>
      <button id="themeBtn" class="icon-button" type="button" aria-label="เปลี่ยนโหมดสี">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a9 9 0 1 0 9 9c0-.45-.03-.89-.1-1.32A7 7 0 0 1 12 3Z"/></svg>
      </button>
    </header>

    <section class="now-card" aria-live="polite">
      <div class="now-topline">
        <div>
          <p id="displayDate" class="now-date">—</p>
          <p id="displayTime" class="now-time">—</p>
        </div>
        <span id="periodBadge" class="period-badge">—</span>
      </div>

      <div class="now-result">
        <div class="number-orb"><span id="currentNumber">—</span></div>
        <div class="now-copy">
          <p class="label">ยามปัจจุบัน</p>
          <h2><span id="currentName">—</span></h2>
          <p id="currentSubperiod" class="subperiod-line">—</p>
        </div>
      </div>

      <div id="nowPrediction" class="now-prediction">
        <div class="now-prediction-head">
          <span id="nowPredictionDot" class="prediction-dot"></span>
          <span id="nowPredictionLabel">ความหมาย • เดินทาง</span>
        </div>
        <p id="nowPredictionText">—</p>
      </div>

      <div class="progress-wrap">
        <div class="progress-copy">
          <span id="remainingText">—</span>
          <span id="nextText">—</span>
        </div>
        <div class="progress-track"><span id="progressBar"></span></div>
      </div>
    </section>

    <section class="controls-card">
      <div class="field-grid">
        <label>
          <span>วันที่</span>
          <input id="dateInput" type="date" />
        </label>
        <label>
          <span>เวลา</span>
          <input id="timeInput" type="time" step="60" />
        </label>
      </div>
      <div class="control-actions">
        <button id="nowBtn" class="secondary-button" type="button">กลับเวลาปัจจุบัน</button>
        <label class="live-toggle"><input id="liveToggle" type="checkbox" checked /><span>อัปเดตอัตโนมัติ</span></label>
      </div>
    </section>

    <section class="category-section">
      <div class="section-heading">
        <div>
          <p class="eyebrow">เลือกเรื่องที่ต้องการดู</p>
          <h2 id="categoryTitle">เดินทาง</h2>
        </div>
        <span class="default-note">ค่าเริ่มต้น</span>
      </div>

      <div id="categoryControl" class="category-control" role="tablist" aria-label="หมวดคำทำนาย">
        <button type="button" data-category="story" role="tab" aria-selected="false">
          <span class="category-icon ear-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12.2 3.2a7 7 0 0 0-7 7v2.1a1 1 0 0 0 2 0v-2.1a5 5 0 1 1 10 0c0 2.2-1.1 3.5-2.5 4.8-1.1 1-2.3 2.1-2.5 3.9a2 2 0 0 1-4 .1 1 1 0 0 0-2 .1 4 4 0 0 0 8-.1c.1-1 1-1.8 2-2.7 1.5-1.4 3-3.2 3-6.1a7 7 0 0 0-7-7Zm-.1 4a3 3 0 0 0-3 3v2.1a1 1 0 1 0 2 0v-2.1a1 1 0 1 1 2 0c0 1-.5 1.5-1.3 2.2a1 1 0 1 0 1.4 1.5c1-.9 1.9-2 1.9-3.7a3 3 0 0 0-3-3Z"/></svg>
          </span>
          <span>เรื่องราว</span>
        </button>
        <button type="button" data-category="health" role="tab" aria-selected="false">
          <span class="category-icon medical-icon" aria-hidden="true"><span>+</span></span>
          <span>เจ็บไข้</span>
        </button>
        <button type="button" data-category="lost" role="tab" aria-selected="false">
          <span class="category-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="m21 19.6-4.4-4.4a7.4 7.4 0 1 0-1.4 1.4l4.4 4.4a1 1 0 0 0 1.4-1.4ZM5 10.5a5.5 5.5 0 1 1 11 0 5.5 5.5 0 0 1-11 0Z"/></svg>
          </span>
          <span>หาของ</span>
        </button>
        <button type="button" data-category="travel" role="tab" aria-selected="true" class="active">
          <span class="category-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2Zm3.8 6.2-2.2 5.4-5.4 2.2 2.2-5.4 5.4-2.2Zm-4 3.6-.6 1.4 1.4-.6.6-1.4-1.4.6Z"/></svg>
          </span>
          <span>เดินทาง</span>
        </button>
      </div>
    </section>

    <section class="legend" aria-label="คำอธิบายสี">
      <span><i class="dot good"></i>ดี</span>
      <span><i class="dot neutral"></i>กลาง ๆ</span>
      <span><i class="dot bad"></i>ควรระวัง</span>
    </section>

    <section id="timeline" class="timeline" aria-live="polite"></section>

    <footer>
      <p>อ้างอิงหลักการจากตำรายามอัฐกาล • วันยามใหม่เริ่มเวลา 06:01 น.</p>
    </footer>
  </main>

  <button id="backToTopBtn" class="back-to-top" type="button" aria-label="ไปยังยามปัจจุบัน" title="ไปยังยามปัจจุบัน">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 5-7 7 1.8 1.8 3.9-3.9V20h2.6V9.9l3.9 3.9L19 12l-7-7Z"/></svg>
  </button>

  <dialog id="detailDialog" class="detail-dialog">
    <form method="dialog">
      <button class="dialog-close" aria-label="ปิด" value="close">×</button>
      <div id="dialogStatus" class="dialog-status"></div>
      <p id="dialogMeta" class="dialog-meta"></p>
      <h2 id="dialogTitle"></h2>
      <p id="dialogText" class="dialog-text"></p>
      <button class="primary-button" value="close">ปิด</button>
    </form>
  </dialog>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
